<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Presensi Karyawan</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
}

input,select{
width:100%;
padding:10px;
margin-bottom:10px;
}

button{
padding:10px 20px;
cursor:pointer;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:8px;
}
</style>

</head>

<body>

<div class="container">

<h2>Presensi Karyawan</h2>

<input id="nama" placeholder="Nama">

<input id="nik" placeholder="NIK">

<select id="shift">
<option>Shift 1</option>
<option>Shift 2</option>
<option>Shift 3</option>
</select>

<select id="departemen">
<option>Produksi</option>
<option>QC</option>
<option>MTC</option>
<option>Utility</option>
</select>

<select id="gedung">
<option>Gedung 4</option>
<option>Gedung 6</option>
<option>Gedung 7</option>
</select>

<select id="status">
<option>Hadir</option>
<option>Izin</option>
<option>Alpha</option>
</select>

<input id="keterangan" placeholder="Keterangan">

<button onclick="simpan()">Simpan</button>

<h3>Data Presensi</h3>

<table>

<thead>
<tr>
<th>Nama</th>
<th>NIK</th>
<th>Shift</th>
<th>Status</th>
</tr>
</thead>

<tbody id="dataPresensi"></tbody>

</table>

</div>

<script>

const supabaseUrl =
'https://qasbqrteajokqhapjutf.supabase.co';

const supabaseKey =
'sb_publishable_xVuvGAJxAB7lb7AUZ-Szrw_EOQY8e5j';

const { createClient } = supabase;

const supabaseClient = createClient(
  supabaseUrl,
  supabaseKey
);

  console.log("Supabase client:", supabaseClient);
  
async function simpan(){

  // 🔥 VALIDASI TARUH DI SINI (PALING ATAS)
  if(!document.getElementById('nama').value || !document.getElementById('nik').value){
    alert("Nama dan NIK wajib diisi!");
    return;
  }

  const data = {
    nama: document.getElementById('nama').value,
    nik: document.getElementById('nik').value,
    shift: document.getElementById('shift').value,
    departemen: document.getElementById('departemen').value,
    gedung: document.getElementById('gedung').value,
    status: document.getElementById('status').value,
    keterangan: document.getElementById('keterangan').value
  };

  const { error } = await supabaseClient
    .from('presensi')
    .insert([data]);

  if(error){
    alert(error.message);
  }else{

    alert("Data berhasil disimpan");

    document.getElementById('nama').value = "";
    document.getElementById('nik').value = "";
    document.getElementById('keterangan').value = "";

    loadData();
  }
}

async function loadData(){

const { data, error } = await supabaseClient
  .from('presensi')
  .select('*')
.order('created at', { ascending: false });

  if(error){
    console.error(error);
    return;
  }

  console.log(data);

  const tbody = document.getElementById('dataPresensi');
  tbody.innerHTML = "";

  data.forEach(item => {
    tbody.innerHTML += `
      <tr>
        <td>${item.nama}</td>
        <td>${item.nik}</td>
        <td>${item.shift}</td>
        <td>${item.status}</td>
      </tr>
    `;
  });

}

loadData();

</script>

</body>
</html>
