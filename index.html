<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ATTENDANCE LIST DOR</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  
body {
  margin: 0;
  font-family: Arial;
  background:#f5f5f5;
  padding:20px;
}

.container {
  max-width:800px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:10px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  padding:10px 20px;
  cursor:pointer;
  border: none;
  border-radius: 6px;
  background: #007bff;
  color: white;
}

table {
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}

th,td {
  border:1px solid #ddd;
  padding:8px;
}

/* ===== DEPARTEMEN GRID ===== */

.dept-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 15px;
}

.dept-item {
  display: flex;
  align-items: center;
  gap: 8px;
  background: #f2f2f2;
  padding: 10px;
  border-radius: 6px;
  font-size: 14px;
  cursor: pointer;
}

@media (max-width: 600px) {
  .dept-grid {
    grid-template-columns: repeat(2, 1fr);
  }

  .dept-item {
    font-size: 13px;
    padding: 12px;
  }
}
</style>

</head>

<body>

<div class="container">

<h2>Presensi Karyawan</h2>

<input id="nama" placeholder="Nama">

<input id="nik" placeholder="NIK">

  <input id="jabatan" placeholder="Jabatan">

<select id="shift">
<option>Shift 1</option>
<option>Shift 2</option>
<option>Shift 3</option>
</select>

<h4>Departemen</h4>

<div class="dept-grid">

  <label class="dept-item"><input type="checkbox" value="Manex" class="dept"> Manex</label>
  <label class="dept-item"><input type="checkbox" value="Produksi" class="dept"> Produksi</label>
  <label class="dept-item"><input type="checkbox" value="Maintenance" class="dept"> Maintenance</label>
  <label class="dept-item"><input type="checkbox" value="Sparepart" class="dept"> Sparepart</label>
  <label class="dept-item"><input type="checkbox" value="Utility" class="dept"> Utility</label>
  <label class="dept-item"><input type="checkbox" value="Warehouse" class="dept"> Warehouse</label>
  <label class="dept-item"><input type="checkbox" value="RMPM" class="dept"> RMPM</label>
  <label class="dept-item"><input type="checkbox" value="QC" class="dept"> QC</label>
  <label class="dept-item"><input type="checkbox" value="GA" class="dept"> GA</label>
  <label class="dept-item"><input type="checkbox" value="HC" class="dept"> HC</label>
  <label class="dept-item"><input type="checkbox" value="Project" class="dept"> Project</label>

</div>

<select id="gedung">
<option>Gedung 4</option>
<option>Gedung 6</option>
<option>Gedung 7</option>
</select>

<select id="status">
  <option value="Hadir">Hadir</option>
  <option value="Izin">Izin</option>
  <option value="Alpha">Alpha</option>
</select>

<input id="keterangan" placeholder="Keterangan">

<button onclick="simpan()">Simpan</button>

<h3>Data Presensi</h3>

<table>

<thead>
<tr>
<th>Nama</th>
<th>NIK</th>
<th>Jabatan</th>
<th>Departemen</th>
<th>Shift</th>
<th>Status</th>
<th>Waktu</th>
</tr>
</thead>

<tbody id="dataPresensi"></tbody>

</table>

</div>

<script>

const supabaseUrl =
'https://qasbqrteajokqhapjutf.supabase.co';

const supabaseKey =
'sb_publishable_xVuvGAJxAB7lb7AUZ-Szrw_EOQY8e5j';

const { createClient } = supabase;

const supabaseClient = createClient(
  supabaseUrl,
  supabaseKey
);

  console.log("Supabase client:", supabaseClient);
  
async function simpan(){

  if(!document.getElementById('nama').value || !document.getElementById('nik').value){
    alert("Nama dan NIK wajib diisi!");
    return;
  }

  // ✅ AMBIL DEPARTEMEN DI LUAR OBJECT
  const deptChecked = document.querySelectorAll('.dept:checked');
  const departemen = Array.from(deptChecked).map(el => el.value);

  const data = {
    nama: document.getElementById('nama').value,
    nik: document.getElementById('nik').value,
    jabatan: document.getElementById('jabatan').value,
    shift: document.getElementById('shift').value,
    departemen: departemen,
    gedung: document.getElementById('gedung').value,
    status: document.getElementById('status').value,
    keterangan: document.getElementById('keterangan').value
  };

  const { error } = await supabaseClient
    .from('presensi')
    .insert([data]);

  if(error){
    alert(error.message);
  } else {
    alert("Data berhasil disimpan");

    document.getElementById('nama').value = "";
    document.getElementById('nik').value = "";
    document.getElementById('jabatan').value = "";
    document.getElementById('keterangan').value = "";

    document.querySelectorAll('.dept').forEach(el => el.checked = false);

    loadData();
  }
}
  
async function loadData(){

const { data, error } = await supabaseClient
  .from('presensi')
  .select('*')
.order('createdAt', { ascending: false });

  if(error){
    console.error(error);
    return;
  }

  console.log(data);

  const tbody = document.getElementById('dataPresensi');
  tbody.innerHTML = "";

data.forEach(item => {
  tbody.innerHTML += `
    <tr>
      <td>${item.nama}</td>
      <td>${item.nik}</td>
      <td>${item.jabatan}</td>
<td>${Array.isArray(item.departemen) ? item.departemen.join(', ') : item.departemen}</td>
<td>${item.shift}</td>
<td>${item.status}</td>
<td>${new Date(item.createdAt).toLocaleString()}</td>
    </tr>
  `;
});

}

loadData();

</script>

</body>
</html>
