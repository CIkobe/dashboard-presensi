<style>
  
body {

}

.container {

input, select {

button {

}

@media (max-width: 600px) {

}

}

.header-app h1{

  font-size:32px;
  font-weight:700;
  letter-spacing:2px;

}

.header-app h2{

}

.header-app p{
  margin:0;
  font-size:14px;

.header-app::after{

  background:white;

</style>

</head>

<body>

<div class="container">

<div class="header-app">
  <h1>PRESENSI DOR</h1>
  <h2>PT Kobe Boga Utama</h2>
  <p>Factory Bojonegoro</p>
</div>

<input id="nama" placeholder="Nama">

<input id="nik" placeholder="NIK">

  <input id="jabatan" placeholder="Jabatan">

<h4>Departemen</h4>

<div class="dept-grid">

 <div class="dept-item" data-value="Manex">Manex</div>
<div class="dept-item" data-value="Produksi">Produksi</div>
<div class="dept-item" data-value="Maintenance">Maintenance</div>
<div class="dept-item" data-value="Sparepart">Sparepart</div>
<div class="dept-item" data-value="Utility">Utility</div>
<div class="dept-item" data-value="Warehouse">Warehouse</div>
<div class="dept-item" data-value="RMPM">RMPM</div>
<div class="dept-item" data-value="QC">QC</div>
<div class="dept-item" data-value="GA">GA</div>
<div class="dept-item" data-value="HC">HC</div>
<div class="dept-item" data-value="Project">Project</div>

</div>

<select id="status">
  <option value="Hadir">Hadir</option>
  <option value="Izin">Izin</option>

</select>

<input id="keterangan" placeholder="Keterangan">

<button onclick="simpan()">Simpan</button>

<h3>Grafik Kehadiran per Departemen</h3>
<canvas id="chartDept"></canvas>

<h3>Yang Sudah Absen Hari Ini</h3>

<div id="listNama"
style="
background:#f8f9fa;
padding:15px;
border-radius:8px;
margin-bottom:20px;">
</div>

<div id="kasCard" style="
background:#fff3cd;
padding:15px;
border-radius:8px;
margin-bottom:20px;
border:1px solid #ffe69c;
">

  <h3>Saldo Kas Denda</h3>

  <div id="saldoKas" style="
  font-size:28px;
  font-weight:bold;
  color:#d35400;">
    Rp 0
  </div>

  <button onclick="editKas()">
    Edit Saldo
  </button>

</div>

<button onclick="exportExcel()">Export Excel</button>

<!-- 🔽 TAMBAHKAN INI DI BAWAHNYA -->
<div class="table-wrapper">
  <table>
    <thead>
      <tr>
        <th>Nama</th>
        <th>NIK</th>
        <th>Jabatan</th>
        <th>Departemen</th>
        <th>Status</th>
        <th>Waktu</th>
      </tr>
    </thead>

    <tbody id="dataPresensi"></tbody>
  </table>
</div>
  
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
  
const supabaseUrl = 'https://qasbqrteajokqhapjutf.supabase.co';
const supabaseKey = 'sb_publishable_xVuvGAJxAB7lb7AUZ-Szrw_EOQY8e5j';

const supabaseClient = createClient(supabaseUrl, supabaseKey);

  let chart; 
  let selectedDept = [];
let allData = [];

  function formatDept(dept) {
  if (!dept) return "-";

  const arr = parseDept(dept);
  return arr.join(" • ");
}
  
document.addEventListener('DOMContentLoaded', () => {

  document.querySelectorAll('.dept-item').forEach(item => {
    item.addEventListener('click', () => {

      const value = item.dataset.value;

      if (selectedDept.includes(value)) {
        selectedDept = selectedDept.filter(v => v !== value);
        item.classList.remove('active');
      } else {
        selectedDept.push(value);
        item.classList.add('active');
      }

    });
  });

});
/* SIMPAN */
window.simpan = async function () {

if (!document.getElementById('nama').value ||
    !document.getElementById('nik').value) {

  Swal.fire({
    icon: 'warning',
    title: 'Data Belum Lengkap',
    text: 'Nama dan NIK wajib diisi'
  });

  return;
}

const data = {
  nama: document.getElementById('nama').value,
  nik: document.getElementById('nik').value,
  jabatan: document.getElementById('jabatan').value,
  departemen: selectedDept.length ? selectedDept : [],
  status: document.getElementById('status').value,
  keterangan: document.getElementById('keterangan').value
};

  const { error } = await supabaseClient
    .from('presensi')
    .insert([data]);

 if (error) {
  Swal.fire({
    icon: 'error',
    title: 'Gagal Menyimpan',
    text: error.message
  });

  return;
}

Swal.fire({
  icon: 'success',
  title: 'Berhasil',
  text: 'Data berhasil disimpan'
});

document.getElementById('nama').value = "";
document.getElementById('nik').value = "";
document.getElementById('jabatan').value = "";
document.getElementById('keterangan').value = "";

selectedDept = [];
document.querySelectorAll('.dept-item').forEach(el => el.classList.remove('active'));

loadData();

};

/* LOAD DATA */
async function loadData() {

const start = new Date();
start.setHours(0,0,0,0);

const end = new Date();
end.setHours(23,59,59,999);

const { data, error } = await supabaseClient
  .from('presensi')
  .select('*')
  .gte('created_at', start.toISOString())
  .lte('created_at', end.toISOString())
  .order('created_at', { ascending: false });

  if (error) {
    console.error(error);
    return;
  }

  const tbody = document.getElementById('dataPresensi');
  tbody.innerHTML = "";

  data.forEach(item => {
    tbody.innerHTML += `
      <tr>
        <td>${item.nama}</td>
        <td>${item.nik}</td>
        <td>${item.jabatan}</td>
        <td>${formatDept(item.departemen)}</td>
        <td>${item.status}</td>
        <td>${item.created_at ? new Date(item.created_at).toLocaleString() : '-'}</td>
      </tr>
    `;
  });
  allData = data;
renderChart(data);
renderNama(data);
  
}
/* AUTO LOAD */
loadData();
loadSaldoKas();

function renderChart(data) {

  const allDepartments = [
    "Manex",
    "Produksi",
    "Maintenance",
    "Sparepart",
    "Utility",
    "Warehouse",
    "RMPM",
    "QC",
    "GA",
    "HC",
    "Project"
  ];

  const deptCount = {};

  // semua dept default 0
  allDepartments.forEach(dept => {
    deptCount[dept] = 0;
  });

  // hitung data presensi
  data.forEach(item => {
    const deptArray = parseDept(item.departemen);

    deptArray.forEach(d => {
      const clean = String(d).trim();

      if (deptCount.hasOwnProperty(clean)) {
        deptCount[clean]++;
      }
    });
  });

  const labels = allDepartments;
  const values = allDepartments.map(dept => deptCount[dept]);

  const ctx = document.getElementById('chartDept');

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: 'Jumlah Presensi',
        data: values
      }]
    }
  });
}

  function renderNama(data){

  const container = document.getElementById('listNama');

  if(data.length === 0){
    container.innerHTML = "Belum ada yang absen";
    return;
  }

  container.innerHTML = data.map(item => `
    <span style="
      display:inline-block;
      margin:4px;
      padding:8px 12px;
      background:#007bff;
      color:white;
      border-radius:20px;
      font-size:14px;">
      ${item.nama}
    </span>
  `).join('');
}
window.exportExcel = function () {
if (!allData.length) {
  Swal.fire({
    icon: 'info',
    title: 'Data Kosong',
    text: 'Tidak ada data untuk diexport'
  });

  return;
}

  const exportData = allData.map(item => ({
    Nama: item.nama,
    NIK: item.nik,
    Jabatan: item.jabatan,
    Departemen: formatDept(item.departemen),
    Status: item.status,
    Waktu: item.created_at
      ? new Date(item.created_at).toLocaleString()
      : "-"
  }));

  const ws = XLSX.utils.json_to_sheet(exportData);
  const wb = XLSX.utils.book_new();

  XLSX.utils.book_append_sheet(wb, ws, "Presensi");

  XLSX.writeFile(wb, "data-presensi.xlsx");
};

  async function loadSaldoKas(){

  const { data, error } = await supabaseClient
    .from('setting')
    .select('saldo_kas')
    .eq('id', 1)
    .single();

  if(error){
    console.error(error);
    return;
  }

  document.getElementById('saldoKas').innerText =
    'Rp ' + Number(data.saldo_kas).toLocaleString('id-ID');
}

window.editKas = async function(){

  const { value: password } = await Swal.fire({
    title: 'Password Admin',
    input: 'password',
    inputPlaceholder: 'Masukkan password'
  });

  if(password !== 'hudaganteng123'){
    Swal.fire({
      icon: 'error',
      title: 'Password Salah'
    });
    return;
  }

const { data, error } = await supabaseClient
  .from('setting')
  .select('*')
  .eq('id', 1)
  .single();

console.log('DATA SETTING:', data);
console.log('ERROR:', error);
if (error || !data) {
  Swal.fire({
    icon: 'error',
    title: 'Data setting tidak ditemukan',
    text: error?.message || 'Row id 5 kosong / RLS blok'
  });
  return;
}
  
  const { value: nominal } = await Swal.fire({
    title: 'Edit Saldo Kas',
    input: 'number',
    inputValue: data?.saldo_kas ?? 0
  });

  if(nominal === null) return;

  const { error } = await supabaseClient
    .from('setting')
    .update({
      saldo_kas: Number(nominal)
    })
    .eq('id', 1);

  if(error){
    Swal.fire({
      icon: 'error',
      title: 'Gagal Update',
      text: error.message
    });
    return;
  }

  Swal.fire({
    icon: 'success',
    title: 'Saldo Berhasil Diubah'
  });

  loadSaldoKas();
}
/* 👇 TAMBAHKAN INI DI PALING BAWAH SCRIPT */
function parseDept(dept) {
  if (!dept) return [];

  if (Array.isArray(dept)) return dept;

  if (typeof dept === "string") {
    try {
      const parsed = JSON.parse(dept);
      if (Array.isArray(parsed)) return parsed;
    } catch {}

    return dept
      .split(",")
      .map(x => x.replace(/[\[\]"]/g, "").trim())
      .filter(Boolean);
  }

  return [];
}
</script>
