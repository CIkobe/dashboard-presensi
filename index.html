<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ATTENDANCE LIST DOR</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  
body {
  margin: 0;
  font-family: Arial;
  background:#f5f5f5;
  padding:20px;
  overflow-x: hidden;
}

.container {
  max-width:800px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:10px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
  box-sizing: border-box;
}

button {
  padding:10px 20px;
  cursor:pointer;
  border: none;
  border-radius: 6px;
  background: #007bff;
  color: white;
}

.table-wrapper {
  width: 100%;
  overflow-x: auto;
}

table {
  width: 100%;
  margin-top: 20px;
  border-collapse: collapse;
  min-width: 600px;
}

th,td {
  border:1px solid #ddd;
  padding:8px;
}

/* ===== DEPARTEMEN GRID ===== */

.dept-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 8px;
  margin-bottom: 15px;
}

.dept-item {
  display: flex;
  align-items: center;
  gap: 8px;
  background: #f2f2f2;
  padding: 10px;
  border-radius: 6px;
  font-size: 14px;
  cursor: pointer;
}

  .dept-item.active {
  background: #007bff;
  color: white;
}
  
@media (max-width: 600px) {
  .dept-grid {
    grid-template-columns: repeat(2, 1fr);
  }

  .dept-item {
    font-size: 13px;
    padding: 12px;
  }

  .container {
    padding: 12px;
  }
}
  body {
  overflow-x: hidden;
}

@media (max-width: 600px) {
  input, select {
    font-size: 14px;
    padding: 8px;
  }

  button {
    width: 100%;
  }
}
</style>

</head>

<body>

<div class="container">

<h2>Presensi Karyawan</h2>

<input id="nama" placeholder="Nama">

<input id="nik" placeholder="NIK">

  <input id="jabatan" placeholder="Jabatan">

<h4>Departemen</h4>

<div class="dept-grid">

 <div class="dept-item" data-value="Manex">Manex</div>
<div class="dept-item" data-value="Produksi">Produksi</div>
<div class="dept-item" data-value="Maintenance">Maintenance</div>
<div class="dept-item" data-value="Sparepart">Sparepart</div>
<div class="dept-item" data-value="Utility">Utility</div>
<div class="dept-item" data-value="Warehouse">Warehouse</div>
<div class="dept-item" data-value="RMPM">RMPM</div>
<div class="dept-item" data-value="QC">QC</div>
<div class="dept-item" data-value="GA">GA</div>
<div class="dept-item" data-value="HC">HC</div>
<div class="dept-item" data-value="Project">Project</div>

</div>

<select id="status">
  <option value="Hadir">Hadir</option>
  <option value="Izin">Izin</option>
  <option value="Alpha">Alpha</option>
</select>

<input id="keterangan" placeholder="Keterangan">

<button onclick="simpan()">Simpan</button>

  <h3>Grafik Kehadiran per Departemen</h3>
<canvas id="chartDept"></canvas>
  
<h3>Data Presensi</h3>

  <div class="table-wrapper">
<table>

<thead>
<tr>
<th>Nama</th>
<th>NIK</th>
<th>Jabatan</th>
<th>Departemen</th>
<th>Status</th>
<th>Waktu</th>
</tr>
</thead>

<tbody id="dataPresensi"></tbody>

</table>

</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

const supabaseUrl = 'https://qasbqrteajokqhapjutf.supabase.co';
const supabaseKey = 'sb_publishable_xVuvGAJxAB7lb7AUZ-Szrw_EOQY8e5j';

const supabaseClient = createClient(supabaseUrl, supabaseKey);

  let chart; 
  let selectedDept = [];
  
document.addEventListener('DOMContentLoaded', () => {

  document.querySelectorAll('.dept-item').forEach(item => {
    item.addEventListener('click', () => {

      const value = item.dataset.value;

      if (selectedDept.includes(value)) {
        selectedDept = selectedDept.filter(v => v !== value);
        item.classList.remove('active');
      } else {
        selectedDept.push(value);
        item.classList.add('active');
      }

    });
  });

});
/* SIMPAN */
window.simpan = async function () {

  if (!document.getElementById('nama').value ||
      !document.getElementById('nik').value) {
    alert("Nama dan NIK wajib diisi!");
    return;
  }

const data = {
  nama: document.getElementById('nama').value,
  nik: document.getElementById('nik').value,
  jabatan: document.getElementById('jabatan').value,
  departemen: selectedDept,
  status: document.getElementById('status').value,
  keterangan: document.getElementById('keterangan').value
};

  const { error } = await supabaseClient
    .from('presensi')
    .insert([data]);

  if (error) {
    alert(error.message);
    return;
  }

alert("Data berhasil disimpan");

document.getElementById('nama').value = "";
document.getElementById('nik').value = "";
document.getElementById('jabatan').value = "";
document.getElementById('keterangan').value = "";

selectedDept = [];
document.querySelectorAll('.dept-item').forEach(el => el.classList.remove('active'));

loadData();

};

/* LOAD DATA */
async function loadData() {
  const { data, error } = await supabaseClient
    .from('presensi')
    .select('*')
    .order('created_at', { ascending: false });

  if (error) {
    console.error(error);
    return;
  }

  const tbody = document.getElementById('dataPresensi');
  tbody.innerHTML = "";

  data.forEach(item => {
    tbody.innerHTML += `
      <tr>
        <td>${item.nama}</td>
        <td>${item.nik}</td>
        <td>${item.jabatan}</td>
        <td>${Array.isArray(item.departemen) ? item.departemen.join(' • ') : item.departemen}</td>
        <td>${item.status}</td>
        <td>${item.created_at ? new Date(item.created_at).toLocaleString() : '-'}</td>
      </tr>
    `;
  });
  renderChart(data);
}

/* AUTO LOAD */
loadData();

  function renderChart(data) {
  const deptCount = {};

  data.forEach(item => {
   let dept = item.departemen || [];

    if (Array.isArray(dept)) {
      dept.forEach(d => {
        deptCount[d] = (deptCount[d] || 0) + 1;
      });
    } else if (dept) {
      deptCount[dept] = (deptCount[dept] || 0) + 1;
    }
  });

  const labels = Object.keys(deptCount);
  const values = Object.values(deptCount);

  const ctx = document.getElementById('chartDept');

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: 'Jumlah Presensi',
        data: values
      }]
    }
  });
}
  
</script>

</body>
</html>
